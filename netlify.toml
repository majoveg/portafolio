# Netlify config — portafolio María Jose Vega Diaz

[build]
  publish = "."

# Cache agresivo para assets que no cambian (imágenes, PDFs, JSX, CSS)
[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# HTML nunca cacheado para que siempre sirva la versión más nueva
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cabeceras de seguridad básicas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
